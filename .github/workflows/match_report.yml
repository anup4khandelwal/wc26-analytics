name: Match Report

on:
  workflow_dispatch:
    inputs:
      home_team:
        description: "Home team (e.g. Brazil)"
        required: false
        default: ""
      away_team:
        description: "Away team (e.g. Argentina)"
        required: false
        default: ""
      fbref_match_id:
        description: "FBref match ID — overrides team names if provided"
        required: false
        default: ""
      charts:
        description: "Comma-separated charts: shot_map,xg_race,pass_network,pizza,defensive  (or 'all')"
        required: false
        default: "shot_map,xg_race,pass_network"
      player:
        description: "Player name (required for pizza / defensive charts)"
        required: false
        default: ""
      twitter_handle:
        description: "Twitter handle for branding footer"
        required: false
        default: "@WC26Analytics"

permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install --upgrade pip && pip install -r requirements.txt

      # matplotlib needs a display even in headless mode
      - name: Install fonts & headless display
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q fonts-liberation xvfb

      - name: Build match report
        env:
          HOME_TEAM: ${{ inputs.home_team }}
          AWAY_TEAM: ${{ inputs.away_team }}
          FBREF_ID: ${{ inputs.fbref_match_id }}
          CHARTS: ${{ inputs.charts }}
          PLAYER: ${{ inputs.player }}
          HANDLE: ${{ inputs.twitter_handle }}
        run: |
          ARGS=()

          if [[ -n "$FBREF_ID" ]]; then
            ARGS+=(--fbref-id "$FBREF_ID")
          fi
          if [[ -n "$HOME_TEAM" ]]; then
            ARGS+=(--home "$HOME_TEAM")
          fi
          if [[ -n "$AWAY_TEAM" ]]; then
            ARGS+=(--away "$AWAY_TEAM")
          fi
          if [[ -n "$CHARTS" ]]; then
            ARGS+=(--charts "$CHARTS")
          fi
          if [[ -n "$PLAYER" ]]; then
            ARGS+=(--player "$PLAYER")
          fi
          if [[ -n "$HANDLE" ]]; then
            ARGS+=(--handle "$HANDLE")
          fi

          # Run under Xvfb so matplotlib can render without a real display
          xvfb-run --auto-servernum python scripts/run_match.py "${ARGS[@]}"

      - name: Commit & push output
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add output/
          if git diff --cached --quiet; then
            echo "Nothing new to commit."
          else
            MATCH_LABEL="${{ inputs.home_team }} vs ${{ inputs.away_team }}"
            if [[ -n "${{ inputs.fbref_match_id }}" && -z "${{ inputs.home_team }}" ]]; then
              MATCH_LABEL="match ${{ inputs.fbref_match_id }}"
            fi
            git commit -m "feat: match report — ${MATCH_LABEL}"
            git push origin HEAD
          fi

      - name: Upload artifacts (for quick inspection)
        uses: actions/upload-artifact@v4
        with:
          name: match-report
          path: output/
          retention-days: 7
