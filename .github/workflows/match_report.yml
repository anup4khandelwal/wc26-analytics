name: Match Report

# ── triggers ──────────────────────────────────────────────────────────────────
#
# Scheduled: fires ~2 hours after each WC 2026 kick-off window (UTC).
#   Typical ET kick-offs: 12:00 / 15:00 / 18:00 / 21:00 ET
#   = 16:00 / 19:00 / 22:00 / 01:00 UTC  → check at 18:30 / 21:30 / 00:30 / 03:30 UTC
#
# Manual:    workflow_dispatch lets you target a specific match or re-run one.
#
on:
  schedule:
    - cron: '30 18 * * *'   # 18:30 UTC  (~2h after 12:00 ET kick-offs)
    - cron: '30 21 * * *'   # 21:30 UTC  (~2h after 15:00 ET kick-offs)
    - cron: '30  0 * * *'   # 00:30 UTC  (~2h after 18:00 ET kick-offs)
    - cron: '30  3 * * *'   # 03:30 UTC  (~2h after 21:00 ET kick-offs)

  workflow_dispatch:
    inputs:
      home_team:
        description: "Home team (e.g. Brazil)"
        required: false
        default: ""
      away_team:
        description: "Away team (e.g. Argentina)"
        required: false
        default: ""
      fbref_match_id:
        description: "FBref match ID — overrides team names if provided"
        required: false
        default: ""
      charts:
        description: "Comma-separated charts: shot_map,xg_race,pass_network,pizza,defensive  (or 'all')"
        required: false
        default: "shot_map,xg_race,pass_network"
      player:
        description: "Player name (required for pizza / defensive charts)"
        required: false
        default: ""
      twitter_handle:
        description: "Twitter handle for branding footer"
        required: false
        default: "@anup4khandelwal"

permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PYTHONPATH: ${{ github.workspace }}
      MPLBACKEND: Agg
    defaults:
      run:
        working-directory: ${{ github.workspace }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip wheel
          # ScraperFC pulls in GUI libs that can't build headless; install core stack only
          pip install soccerdata mplsoccer matplotlib pandas pyarrow requests numpy scipy Pillow seaborn unidecode tqdm pymupdf tweepy
          pip install seleniumbase mycdp wrapper-tls-requests --no-deps || true

      - name: Install fonts & headless display
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q fonts-liberation xvfb

      # ── auto mode: scheduled, or manual dispatch with no match specified ──────
      - name: Auto-process today's matches
        if: >-
          github.event_name == 'schedule' ||
          (github.event_name == 'workflow_dispatch' &&
           inputs.home_team == '' && inputs.fbref_match_id == '')
        run: xvfb-run --auto-servernum python scripts/run_today.py

      # ── manual run: process a specific match ──────────────────────────────────
      - name: Process specific match (manual)
        if: >-
          github.event_name == 'workflow_dispatch' &&
          (inputs.home_team != '' || inputs.fbref_match_id != '')
        env:
          HOME_TEAM: ${{ inputs.home_team }}
          AWAY_TEAM: ${{ inputs.away_team }}
          FBREF_ID:  ${{ inputs.fbref_match_id }}
          CHARTS:    ${{ inputs.charts }}
          PLAYER:    ${{ inputs.player }}
          HANDLE:    ${{ inputs.twitter_handle }}
        run: |
          ARGS=()
          [[ -n "$FBREF_ID"   ]] && ARGS+=(--fbref-id "$FBREF_ID")
          [[ -n "$HOME_TEAM"  ]] && ARGS+=(--home "$HOME_TEAM")
          [[ -n "$AWAY_TEAM"  ]] && ARGS+=(--away "$AWAY_TEAM")
          [[ -n "$CHARTS"     ]] && ARGS+=(--charts "$CHARTS")
          [[ -n "$PLAYER"     ]] && ARGS+=(--player "$PLAYER")
          [[ -n "$HANDLE"     ]] && ARGS+=(--handle "$HANDLE")
          xvfb-run --auto-servernum python scripts/run_match.py "${ARGS[@]}"

      # ── commit whatever landed in output/ ─────────────────────────────────────
      - name: Commit & push output
        run: |
          git config user.name  "Anup Khandelwal"
          git config user.email "anup4khandelwal@gmail.com"
          git add output/
          if git diff --cached --quiet; then
            echo "Nothing new to commit."
          else
            if [[ "${{ github.event_name }}" == "schedule" ]]; then
              LABEL="scheduled run $(date -u +%Y-%m-%d)"
            else
              LABEL="${{ inputs.home_team }} vs ${{ inputs.away_team }}"
              [[ -z "${{ inputs.home_team }}" ]] && LABEL="match ${{ inputs.fbref_match_id }}"
            fi
            git commit -m "feat: match report — ${LABEL}"
            git push origin HEAD
          fi

      # ── post thread to Twitter / X ───────────────────────────────────────────
      - name: Post thread to Twitter
        if: success()
        env:
          TWITTER_API_KEY:              ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET:           ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN:         ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET:  ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
        run: python scripts/post_thread.py

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: match-report-${{ github.run_id }}
          path: output/
          retention-days: 7
