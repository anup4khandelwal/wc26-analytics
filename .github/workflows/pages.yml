name: Deploy Site

# Rebuilds and publishes the GitHub Pages site whenever new match output
# lands.  Pushes made by the Match Report workflow use GITHUB_TOKEN, which
# never fires `push` events — that's why the workflow_run trigger exists.
on:
  workflow_run:
    workflows: ["Match Report"]
    types: [completed]
  push:
    branches: [main]
    paths:
      - "output/**"
      - "scripts/build_site.py"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    # for workflow_run: only deploy after a successful Match Report run
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build site
        run: python scripts/build_site.py

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
